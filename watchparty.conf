server {
    listen 80;
    server_name 82.25.104.130; # Use your domain name here if you have one, e.g. watchparty.yourdomain.com

    root /var/www/watchparty;
    index index.html;

    access_log /var/log/nginx/watchparty-access.log;
    error_log /var/log/nginx/watchparty-error.log;

    # Serve static files properly
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache control for Service Worker and static assets
    location ~* \.(?:css|js|map|png|jpg|jpeg|gif|ico|svg|json|webmanifest)$ {
        expires max;
        access_log off;
        add_header Cache-Control "public";
    }

    # Ensure Service Worker is not aggressively cached by browsers
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
}
